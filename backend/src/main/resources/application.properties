# Configuracion del servidor
server.port=8080

# Configuracion de MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/usochicamocha_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuracion CORS para Svelte (puertos 5173 y 5174)
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174
